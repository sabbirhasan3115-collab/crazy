<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seven-Day Sprint &mdash; Study Tracker</title>
<meta name="theme-color" content="#10151c">
<meta name="description" content="A 7-day study tracker with live timers, period alarms and system notifications.">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="toastStack"></div>
<div class="container">
  <header class="app-head">
    <h1>Seven-Day Sprint</h1>
    <div class="sub">Physics &middot; Chemistry &middot; Math &middot; Biology &middot; Bangla &middot; English &mdash; admission countdown</div>
    <div class="chip-row" id="headerStats">
      <div id="liveClock">--:--:--</div>
      <button class="sound-toggle on" id="soundToggle" onclick="toggleSound()">
        <span class="icon">&#x1F514;</span><span id="soundLabel">Alerts on</span>
      </button>
      <button class="sound-toggle" id="notifToggle" onclick="toggleNotif()" title="Get a system notification banner even when this tab isn't focused">
        <span class="icon">&#x1F515;</span><span id="notifLabel">Enable background alerts</span>
      </button>
      <button class="sound-toggle" id="testToggle" onclick="testAlert()" title="Play the alarm sound and fire a test notification right now">
        <span class="icon">&#x1F9EA;</span><span>Test alarm</span>
      </button>
    </div>
  </header>
  <nav class="tabs">
    <button class="tab-btn active" data-tab="daily" onclick="switchTab('daily')">Daily + Topicwise</button>
    <button class="tab-btn" data-tab="cq" onclick="switchTab('cq')">CQ Written</button>
    <button class="tab-btn" data-tab="acc" onclick="switchTab('acc')">Accountability</button>
  </nav>
  <main>
    <section class="tab-panel active" id="tab-daily"></section>
    <section class="tab-panel" id="tab-cq"></section>
    <section class="tab-panel" id="tab-acc"></section>
  </main>
</div>
<script src="js/app.js"></script>
</body>
</html>
